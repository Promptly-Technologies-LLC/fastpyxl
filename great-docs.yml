# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Required because devtools/ is also importable at the project root.
module: fastpyxl

display_name: fastpyxl

# Docstring format used throughout fastpyxl (inherited from openpyxl).
parser: sphinx

# Static analysis avoids cyclic-alias introspection errors in descriptor types.
dynamic: false

exclude:
  - KEEP_VBA
  - DummyCode

logo: doc/logo.svg

authors:
  - name: See AUTHORS
    role: Author
    email: charlie.clark@clark-consulting.eu

# Populated by `great-docs init` / refreshed on each build.
reference:
  - title: Classes
    desc: Main classes provided by the package
    contents:
      - name: Workbook
        members: false
      - cell.Cell
      - cell.MergedCell
      - cell.ReadOnlyCell
      - chart.AreaChart
      - chart.AreaChart3D
      - chart.BarChart
      - chart.BarChart3D
      - chart.BubbleChart
      - chart.DoughnutChart
      - chart.LineChart
      - chart.LineChart3D
      - chart.PieChart
      - chart.PieChart3D
      - chart.ProjectedPieChart
      - chart.RadarChart
      - chart.Reference
      - chart.ScatterChart
      - chart.StockChart
      - chart.SurfaceChart
      - chart.SurfaceChart3D
      - chartsheet.Chartsheet
      - comments.Comment
      - drawing.Drawing
      - formatting.Rule
      - formula.Tokenizer
      - styles.Alignment
      - styles.Border
      - styles.Color
      - styles.Fill
      - styles.Font
      - styles.GradientFill
      - styles.NamedStyle
      - styles.NumberFormatDescriptor
      - styles.PatternFill
      - styles.Protection
      - styles.Side
      - typed_serialisable.ElementList
      - typed_serialisable.Extension
      - typed_serialisable.ExtensionList
