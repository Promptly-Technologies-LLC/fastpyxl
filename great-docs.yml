      - xml.lxml_env_set

  - title: Constants
    desc: Module-level constants and data
    contents:
      - DEBUG
      - compat.NUMERIC_TYPES
      - compat.string_types
      - styles.DEFAULT_FONT
      - typed_serialisable.Field
      - xml.DEFUSEDXML
      - xml.LXML

  - title: Other
    desc: Additional exports
    contents:
      - packaging
      - pivot
      - reader
      - workbook
      - worksheet
      - writer

site_url: "https://promptlytechnologies.com/fastpyxl/"

repo: https://github.com/Promptly-Technologies-LLC/fastpyxl

jupyter: python3
