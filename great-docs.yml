  - title: Functions
    desc: Utility functions
    contents:
      - cell.WriteOnlyCell
      - chart.Series
      - compat.deprecated
      - compat.safe_string
      - load_workbook
      - open
      - styles.is_builtin
      - styles.is_date_format
      - styles.is_timedelta_format
